<svg fill="none" viewBox="0 0 600 16" width="600" height="16" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        @font-face {
          font-family: 'JetBrains Mono';
          font-weight: 400;
          src: url('data:font/woff2;base64,') format('woff2');
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        .nvim {
          width: 600px; height: 16px;
          background: none;
          font-family: 'JetBrains Mono', monospace;
          font-size: 12px;
          display: flex;
          flex-direction: column;
          overflow: hidden;
        }
        .main {
          flex: 1;
          position: relative;
          display: flex;
          align-items: center;
          justify-content: center;
        }
        .tildes {
          position: absolute;
          left: 6px; top: 0px; bottom: 0;
          color: #333;
          line-height: 16px;
          user-select: none;
        }
        .startup {
          font-family: 'JetBrains Mono', monospace;
          line-height: 16px;
          width: 360px;
          text-align: center;
        }
        .line { white-space: pre; text-align: center; }
        .a { color: #007373; }
        .b { color: #105f31; }
      </style>
      <div class="nvim">
        <div class="main">
          <div class="tildes">~</div>
          <div class="startup">
            <div class="line"><span class="a">─────</span><span class="b">────</span></div>
          </div>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
